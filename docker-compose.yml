# -*- coding: utf-8 -*-
#
version: '3.2'

volumes:

  data:
    driver: local

services:

  client:
    build: client
    restart: "always"
    links:
      - server
    ports:
      - 5000:80
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=8080
    volumes:
      - ${PWD}/etc/nginx-site.template:/etc/nginx/templates/default.conf.template:ro

  server:
    build: server
    restart: "always"
    links:
      - db:sbs
    volumes:
      - ${PWD}/log:/opt/log
      - ${PWD}/server:/opt/server
    ports:
      - 8080
    environment:
      - CONFIG=config/test_config.yml
      - TESTING=1
      - DATABASE_URI=mysql+pymysql://sbs:sbs@sbs/sbs_test

  db:
    image: mysql:5.7
    restart: always
    environment:
       MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-sbs}
       MYSQL_DATABASE: sbs
       MYSQL_USER: sbs
       MYSQL_PASSWORD: sbs
    ports:
      - 3306:3306
    volumes:
      - data:/var/lib/mysql
      - ${PWD}/etc/init.sql:/docker-entrypoint-initdb.d/init.sql:ro