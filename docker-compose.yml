# -*- coding: utf-8 -*-
#
version: '3.2'

volumes:

  data:
    driver: local

services:


  client:
    build: client
    restart: "always"
    links:
      - server:api
    ports:
      - 5000:80
    volumes:
      - /home/harry/project/SBS/etc/nginx.conf:/etc/nginx/nginx.conf:ro

  server:
    build: server
    restart: "always"
    links:
      - db:sbs
    volumes:
      - /home/harry/project/SBS/log:/opt/log
    ports:
      - 8080
    environment:
      - CONFIG=config/test_config.yml
      - TESTING=1
      - DATABASE_URI=mysql+pymysql://sbs:sbs@sbs/sbs_test

  db:
    image: mysql:5.7
    restart: always
    environment:
       MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-sbs}
       MYSQL_DATABASE: sbs
       MYSQL_USER: sbs
       MYSQL_PASSWORD: sbs
    ports:
      - 3306
    volumes:
      - data:/var/lib/mysql
      - /home/harry/project/SBS/etc/init.sql:/docker-entrypoint-initdb.d/init.sql:ro