summary: "Get all users."
description: "Retrieves all users provisioned for the SCIM service."

tags:
  - "SCIM client"

consumes:
  - "application/json"

produces:
  - "application/json"

security:
  - Service: [ 'Authorization' ]

parameters:
  - name: Authorization
    in: header
    description: Bearer SCIM service token
    required: true
    schema:
      type: string
      example: Bearer Am4Hp7GBO2lMseskWHRmEtE3DWD-VxZZ3qwMkNPv6qZ8
  - name: startIndex
    in: query
    description: 1-based index of the first result to return (RFC 7644)
    required: false
    schema:
      type: integer
      minimum: 1
      example: 1
  - name: count
    in: query
    description: Maximum number of results to return
    required: false
    schema:
      type: integer
      minimum: 0
      example: 15

responses:
  200:
    description: List of users
    schema:
      $ref: '/swagger/schemas/ScimUserListResult.yaml'
  401:
    schema:
      $ref: '/swagger/components/responses/Unauthorized.yaml'
