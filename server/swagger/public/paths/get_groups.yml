summary: "Get all groups."
description: "Retrieves all groups provisioned for the SCIM service."

tags:
  - "SCIM client"

consumes:
  - "application/json"

produces:
  - "application/json"

security:
  - Service: [ 'Authorization' ]

parameters:
  - name: Authorization
    in: header
    description: Bearer SCIM service token
    required: true
    type: string
    example: Bearer Am4Hp7GBO2lMseskWHRmEtE3DWD-VxZZ3qwMkNPv6qZ8

responses:
  200:
    description: List of groups
    schema:
      $ref: '/swagger/schemas/ScimGroupListResult.yaml'
  401:
    description: Unauthorized
    schema:
      $ref: '/swagger/components/responses/Unauthorized.yaml'
