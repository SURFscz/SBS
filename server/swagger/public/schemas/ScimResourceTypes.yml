---
type: object
properties:
  itemsPerPage:
    type: number
    description: "Number of items returned per page"
    example: 15
  startIndex:
    type: number
    description: "Zero-based start index of the page"
    example: 0
  totalResults:
    type: number
    description: "Total number of results"
    example: 15
  schemas:
    type: array
    description: "SCIM schemas"
    items:
      type: string
      example: "urn:ietf:params:scim:api:messages:2.0:ListResponse"
  Resources:
    type: array
    description: "Resource type definitions in the current page"
    items:
      type: object
      additionalProperties: true
