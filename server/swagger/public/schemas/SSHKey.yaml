---
type: object
properties:
  id:
    type: number
    readOnly: true
    example: 999
  ssh_value:
    type: string
    description: "The full public SSH key value"
    example: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAAB..."
  user_id:
    type: number
    example: 999
  name:
    type:
      - string
      - "null"
    description: "Optional label for this SSH key"
    example: "my-laptop"
  created_at:
    type: number
    description: "Created timestamp in epoch seconds"
    example: 1644015600
  updated_at:
    type: number
    description: "Updated timestamp in epoch seconds"
    example: 1644015600
