---
type: object
properties:
  id:
    type: number
    readOnly: true
    example: 999
  user_id:
    type: number
    example: 999
  collaboration_id:
    type: number
    example: 999
  role:
    type: string
    example: "admin"
  status:
    type: string
    example: "active"
  invitation_id:
    type:
      - number
      - "null"
    example: 1
  expiry_date:
    type:
      - number
      - "null"
    description: "Membership expiry timestamp in epoch seconds"
    example: 1642781077
  created_at:
    type: number
    description: "Created timestamp in epoch seconds"
    example: 1644015600
  updated_at:
    type: number
    description: "Updated timestamp in epoch seconds"
    example: 1644015600
  created_by:
    type: string
    description: "UID of the user who created this"
    example: "urn:jdoe"
  updated_by:
    type: string
    description: "UID of the user who updated this"
    example: "urn:jdoe"
  user:
    $ref: '/swagger/schemas/User.yaml'
