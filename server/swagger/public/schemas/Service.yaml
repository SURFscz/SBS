---
type: object
properties:
  id:
    type: number
    readOnly: true
    example: 888
  name:
    type: string
    example: "Cloud research service"
  abbreviation:
    type: string
    example: "cloud"
  description:
    type: string
    example: "A cloud research service, configured to mainly research cumulus formations."
  entity_id:
    type: string
    format: url
    example: "https://service.cloud.example.com"
  contact_email:
    type: string
    example: "jdoe@cloud.example.com"
  security_email:
    type: string
    example: "jdoe@cloud.example.com"
  support_email:
    type: string
    example: "jdoe@cloud.example.com"
  uuid4:
    type: string
    format: uuid
    readOnly: true
    description: "Unique generated uuid for the cached image"
    example: "12035254-E1F1-4190-9E60-EDAEE8DEE72A"
  access_allowed_for_all:
    type: boolean
    description: "If true all collaborations can use this service"
    example: true
  automatic_connection_allowed:
    type: boolean
    description: "If true all collaborations can connect to this service"
    example: true
  non_member_users_access_allowed:
    type: boolean
    description: "If true then non collaboration members can access this service"
    example: true
  override_access_allowed_all_connections:
    type: boolean
    description: "If true in combination access_allowed_for_all equals true then connections need to be requested"
    example: true
  token_enabled:
    type: boolean
    description: "If true then tokens can be created for users"
    example: true
  allow_restricted_orgs:
    type: boolean
    description: "If true, this service is allowed to be connected to collaborations of restricted organisations"
    example: true
  token_validity_days:
    type: number
    description: "Tokens validity in days"
    example: 30
  accepted_user_policy:
    type: string
    format: uri
    example: "https://service.cloud.example.com/aup"
  privacy_policy:
    type: string
    format: uri
    example: "https://service.cloud.example.com/privacy"
  logo:
    type: string
    format: uri
    descriotion: "URL for the logo"
    example: "http://sram.surf.nl/api/images/collaborations/b7f621e3-de98-4de4-aca0-1573f4eb8339"
  created_at:
    type: number
    description: "The date of the created at in epoch seconds"
    example: 1644015600
  created_by:
    type: string
    description: "UID of the user who created this"
    example: "urn:admin"
  updated_by:
    type: string
    description: "UID of the user who updated this"
    example: "urn:admin"
  uri:
    type: string
    example: "https://service.cloud.example.com"
  uri_info:
    type:
      - string
      - "null"
    example: "More info"
  grants:
    type: array
    items:
      type: string
  redirect_urls:
    type: array
    items:
      type: string
  organisation_name:
    type: string
    example: "University of Harderwijk"
  providing_organisation:
    type: string
    example: "SURF"
  ldap_enabled:
    type: boolean
    example: false
  ldap_identifier:
    type: string
    example: "ldap_id"
  ldap_password:
    type: string
    example: ""
  saml_enabled:
    type: boolean
    example: false
  oidc_enabled:
    type: boolean
    example: false
  oidc_client_secret:
    type: string
    example: ""
  is_public_client:
    type: boolean
    example: false
  acs_locations:
    type: array
    items:
      type: string
  connection_setting:
    type: string
    example: "on_request"
  pam_web_sso_enabled:
    type: boolean
    example: true
  scim_enabled:
    type: boolean
    example: false
  scim_url:
    type: string
    example: "https://scim.example.com"
  scim_bearer_token:
    type: string
    example: ""
  scim_client_enabled:
    type: boolean
    example: false
  sweep_scim_enabled:
    type: boolean
    example: false
  sweep_scim_daily_rate:
    type: number
    example: 0
  sweep_scim_last_run:
    type: number
    example: 0
  sweep_remove_orphans:
    type: boolean
    example: false
  exported_at:
    type: number
    example: 0
  export_successful:
    type: boolean
    example: false
  export_external_identifier:
    type: string
    example: ""
  export_external_version:
    type: string
    example: ""
  support_email_unauthorized_users:
    type: string
    example: ""
  crm_organisation_id:
    type: string
    example: ""
  access_allowed_for_crm_organisation:
    type: boolean
    example: false
