---
type: object
properties:
  id:
    type: number
    readOnly: true
    example: 999
  identifier:
    type: string
    format: uuid
    readOnly: true
    description: "Unique generated identifier of the collaboration"
    example: "12035254-E1F1-4190-9E60-EDAEE8DEE72A"
  name:
    type: string
    example: "Cumulus research group"
  short_name:
    type: string
    example: "cumulusgrp"
  description:
    type: string
    example: "Cumulus research group of the University of Harderwijk."
  global_urn:
    type: string
    description: "The unique collaboration URN within the organisation"
    example: "uva:researchers"
  status:
    type: string
    example: "active"
  organisation_id:
    type: number
    example: 666
  uuid4:
    type: string
    format: uuid
    readOnly: true
    description: "Unique generated UUID for the cached image"
    example: "12035254-E1F1-4190-9E60-EDAEE8DEE72A"
  logo:
    type:
      - string
      - "null"
    description: "Base64 encoded logo or URL"
    example: "http://sram.surf.nl/api/images/collaborations/b7f621e3"
  website_url:
    type:
      - string
      - "null"
    format: uri
    example: "https://research.uniharderwijk.nl/cumulusgrp"
  accepted_user_policy:
    type:
      - string
      - "null"
    format: uri
    example: "https://aup.example.com"
  support_email:
    type:
      - string
      - "null"
    example: "support@example.com"
  disable_join_requests:
    type:
      - boolean
      - "null"
    description: "If true users cannot request to become a member of this collaboration"
    example: true
  disclose_member_information:
    type:
      - boolean
      - "null"
    description: "If true the names of members are disclosed to other members"
    example: true
  disclose_email_information:
    type:
      - boolean
      - "null"
    description: "If true the email addresses of members are disclosed to other members"
    example: true
  expiry_date:
    type:
      - number
      - "null"
    description: "Expiry timestamp in epoch seconds"
    example: 1644015600
  last_activity_date:
    type: number
    description: "Last activity timestamp in epoch seconds"
    example: 1642947278
  created_at:
    type: number
    description: "Created timestamp in epoch seconds"
    example: 1644015600
  updated_at:
    type: number
    description: "Updated timestamp in epoch seconds"
    example: 1644015600
  created_by:
    type: string
    description: "UID of the user who created this"
    example: "urn:admin"
  updated_by:
    type: string
    description: "UID of the user who updated this"
    example: "urn:admin"
  collaboration_memberships_count:
    type: number
    description: "The number of memberships"
    example: 0
  invitations_count:
    type: number
    description: "The number of open invitations"
    example: 3
  collaboration_memberships:
    type: array
    items:
      $ref: '/swagger/schemas/CollaborationMembership.yaml'
  services:
    type: array
    items:
      $ref: '/swagger/schemas/Service.yaml'
  groups:
    type: array
    items:
      $ref: '/swagger/schemas/Group.yaml'
  tags:
    type: array
    description: "Tag values for the collaboration"
    items:
      type: string
      example: "label_test"
  units:
    type: array
    description: "Unit names for this collaboration"
    items:
      type: string
      example: "fac_wiskunde"
